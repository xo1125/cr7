  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  body {
    color: var(--ink); font-family: var(--mono);
    -webkit-tap-highlight-color: transparent; user-select: none;
    touch-action: none;
  }

  /* CSS fallback (shows only if WebGL fails) */
  #fallback {
    position: fixed; inset: 0; z-index: 0;
    background: #000 var(--photo) center 36% / cover no-repeat;
    filter: brightness(0.5) saturate(1.05) blur(2px);
  }
  #gl { position: fixed; inset: 0; z-index: 1; display: block; width: 100%; height: 100%; }

  .veil {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background:
      radial-gradient(ellipse 75% 55% at 50% 46%, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 60%),
      linear-gradient(to bottom, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0) 22%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.9) 100%);
  }

  .hud { position: fixed; inset: 0; z-index: 3; pointer-events: none;
         display: flex; flex-direction: column; padding: clamp(1.1rem, 4vw, 2.4rem); }

  .top { display: flex; justify-content: space-between; align-items: baseline;
         font-size: clamp(0.6rem, 1.6vw, 0.8rem); letter-spacing: 0.18em;
         text-transform: lowercase; color: var(--dim); }
  .top .brand { color: var(--ink); letter-spacing: 0.12em; }

  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.7rem; }
  .num {
    font-weight: 700; font-size: clamp(4rem, 19vw, 13rem); line-height: 0.82;
    letter-spacing: -0.045em; font-variant-numeric: tabular-nums;
    text-shadow: 0 6px 60px rgba(0,0,0,0.55);
    animation: breathe 5.5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:.96;transform:scale(1)} 50%{opacity:1;transform:scale(1.012)} }
  .to { font-size: clamp(0.72rem, 1.9vw, 1rem); letter-spacing: 0.22em; color: #B8B8B8; text-transform: uppercase; }
  .to b { color: var(--ink); }

  .bottom { display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }
  .troll {
    font-family: var(--voice); font-style: italic; text-align: center; text-transform: lowercase;
    font-size: clamp(1rem, 3.2vw, 1.55rem); color: #C4C4C4; line-height: 1.3;
    text-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  .troll em { color: var(--ink); font-style: italic; }

  .hint {
    font-size: clamp(0.58rem, 1.5vw, 0.72rem); letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--dim); opacity: 0; animation: hintIn 1s 1.8s forwards;
  }
  .hint.gone { opacity: 0 !important; transition: opacity 0.6s; }
  @keyframes hintIn { to { opacity: 0.7; } }

  @media (prefers-reduced-motion: reduce) { .num { animation: none; } }
</style>

    precision highp float;
    uniform vec2 u_res; uniform float u_time; uniform sampler2D u_tex;
    uniform vec2 u_img; uniform vec3 u_ptr; uniform vec2 u_vel; uniform float u_goal;
    uniform float u_reveal; uniform vec2 u_wind;

    float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);

      return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }
    float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<4;i++){ v+=a*noise(p); p*=2.0; a*=0.5; } return v; }

    vec2 cover(vec2 uv){
      float sa=u_res.x/u_res.y, ia=u_img.x/u_img.y; vec2 o=uv;
      if(sa>ia){ o.y=(uv.y-0.5)*(ia/sa)+0.5; } else { o.x=(uv.x-0.5)*(sa/ia)+0.5; }

      vec2 dir = normalize(vec2(1.0,0.12));

      float pd = exp(-dot(toP,toP)*16.0) * u_ptr.z;
      vec2 drag = u_vel * pd * 1.6;

    ptr.s*=0.90; vel.x*=0.86; vel.y*=0.86; if(goalPulse>0) goalPulse=Math.max(0,goalPulse-0.012);

    // load reveal (eased) — instant if reduced motion
    let reveal = reduce ? 1.0 : Math.min(1.0, t/REVEAL);
    reveal = reveal*reveal*(3.0-2.0*reveal);

    // idle wind: ramps in when untouched, eases out on interaction
    const idle = (now - lastInteract) > 1100;
    windAmt += ((idle?1.0:0.0) - windAmt) * 0.02;
    const wx = (Math.sin(t*0.23)*0.6 + Math.sin(t*0.097+1.7)*0.4) * windAmt;
    const wy = (Math.sin(t*0.15+2.3)*0.35) * windAmt;

    gl.uniform2f(u_res,canvas.width,canvas.height);
    gl.uniform1f(u_time, reduce?0.0:t);
    gl.uniform2f(u_img,imgW,imgH);
    gl.uniform3f(u_ptr,ptr.x,ptr.y,ptr.s);
    gl.uniform2f(u_vel,vel.x,vel.y);
    gl.uniform1f(u_goal,goalPulse);
    gl.uniform1f(u_reveal,reveal);
    gl.uniform2f(u_wind,wx,wy);
    gl.uniform1i(u_tex,0);
    gl.drawArrays(gl.TRIANGLES,0,3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
